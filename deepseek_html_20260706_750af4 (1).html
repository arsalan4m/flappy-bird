<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dusk Glider — Skins & Shop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700;900&display=swap');
  
  :root{
    --accent:#ffb84d;
    --bg-dark:#0a0612;
    --card-bg:rgba(20,30,50,0.85);
    --gold:#ffd700;
    --diamond:#00d4ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg-dark);
    font-family:'Exo 2','Segoe UI',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    height:100vh;
    color:#fff;
  }
  #wrap{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    width:min(100vw, 480px);
    height:100vh;
    max-height:800px;
    background:radial-gradient(ellipse at center, #1a2a3a, #0a0f1a);
    overflow:hidden;
    border-radius:8px;
    box-shadow:0 0 60px rgba(0,0,0,0.8);
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
  }
  
  /* HUD */
  #hud{
    position:absolute;
    top:12px;
    left:0;right:0;
    text-align:center;
    font-family:'Orbitron',monospace;
    font-size:38px;
    font-weight:900;
    color:#fff;
    text-shadow:0 0 20px rgba(255,200,50,0.3),0 4px 0 rgba(0,0,0,0.5);
    pointer-events:none;
    z-index:5;
    letter-spacing:2px;
  }
  #best{
    position:absolute;
    top:58px;
    left:0;right:0;
    text-align:center;
    font-family:'Exo 2',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    pointer-events:none;
    z-index:5;
  }
  #keysDisplay{
    position:absolute;
    top:12px;
    left:12px;
    font-family:'Exo 2',sans-serif;
    font-size:16px;
    font-weight:700;
    color:#ffd700;
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    z-index:5;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(0,0,0,0.4);
    padding:4px 12px;
    border-radius:20px;
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,215,0,0.2);
  }
  #diamondDisplay{
    position:absolute;
    top:12px;
    right:12px;
    font-family:'Exo 2',sans-serif;
    font-size:16px;
    font-weight:700;
    color:#00d4ff;
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    z-index:5;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:6px;
    background:rgba(0,0,0,0.4);
    padding:4px 12px;
    border-radius:20px;
    backdrop-filter:blur(4px);
    border:1px solid rgba(0,212,255,0.2);
  }

  /* Overlays */
  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    text-align:center;
    z-index:10;
    padding:20px;
    background:radial-gradient(ellipse at center, rgba(10,6,18,0.7) 0%, rgba(10,6,18,0.95) 100%);
    backdrop-filter:blur(6px);
  }
  .hidden{display:none !important;}
  
  .title{
    font-family:'Orbitron',monospace;
    font-size:42px;
    font-weight:900;
    color:var(--accent);
    text-shadow:0 0 40px rgba(255,184,77,0.3),0 4px 0 rgba(0,0,0,0.5);
    letter-spacing:3px;
  }
  .subtitle{
    font-family:'Exo 2',sans-serif;
    font-size:13px;
    font-weight:600;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.5);
    margin-top:-4px;
  }
  .btn{
    font-family:'Exo 2',sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:2px;
    text-transform:uppercase;
    padding:14px 36px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:all 0.15s;
    background:linear-gradient(180deg, var(--accent), #ff9a3c);
    color:#1a0a0a;
    box-shadow:0 6px 0 #b8631f,0 10px 30px rgba(0,0,0,0.5);
  }
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b8631f,0 4px 15px rgba(0,0,0,0.4);}
  .btn-secondary{
    background:linear-gradient(180deg, #4a6a8a, #2a4a6a);
    box-shadow:0 6px 0 #1a2a3a;
    color:#fff;
  }
  .btn-secondary:active{box-shadow:0 2px 0 #1a2a3a;}
  .btn-gold{
    background:linear-gradient(180deg, #ffd700, #f0a500);
    box-shadow:0 6px 0 #b87a00;
    color:#1a0a0a;
  }
  .btn-diamond{
    background:linear-gradient(180deg, #00d4ff, #0099cc);
    box-shadow:0 6px 0 #006688;
    color:#fff;
  }
  .btn-danger{
    background:linear-gradient(180deg, #ff4444, #cc2222);
    box-shadow:0 6px 0 #881111;
    color:#fff;
  }
  
  .stat-row{display:flex;gap:30px;margin:6px 0;}
  .stat{display:flex;flex-direction:column;align-items:center;}
  .stat .num{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;}
  .stat .lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);}
  
  .hint{
    font-family:'Exo 2',sans-serif;
    font-size:12px;
    color:rgba(255,255,255,0.4);
    letter-spacing:1px;
    max-width:280px;
    line-height:1.6;
  }
  
  /* Shop Menu */
  #shopScreen .title{font-size:28px;}
  .shop-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    width:100%;
    max-width:380px;
    margin:4px 0;
  }
  .shop-item{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:12px 8px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
    backdrop-filter:blur(4px);
  }
  .shop-item:active{transform:scale(0.95);}
  .shop-item.owned{border-color:rgba(0,255,100,0.3);background:rgba(0,255,100,0.05);}
  .shop-item.selected{border-color:var(--accent);background:rgba(255,184,77,0.1);box-shadow:0 0 20px rgba(255,184,77,0.1);}
  .shop-item .bird-preview{
    width:50px;
    height:40px;
    margin:0 auto 4px;
    position:relative;
  }
  .shop-item .bird-preview svg{
    width:100%;
    height:100%;
  }
  .shop-item .name{
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .shop-item .price{
    font-size:10px;
    color:rgba(255,255,255,0.5);
    margin-top:2px;
  }
  .shop-item .price .key-icon{color:#ffd700;}
  .shop-item .price .diamond-icon{color:#00d4ff;}
  .shop-item .owned-badge{
    font-size:9px;
    color:#00ff64;
    font-weight:700;
    letter-spacing:1px;
  }
  
  .shop-nav{
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .shop-nav .btn{font-size:12px;padding:10px 24px;}
  
  .respown-options{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:4px;
    width:100%;
    max-width:320px;
  }
  .respown-options .btn{font-size:13px;padding:12px 24px;width:100%;}
  
  /* Scrollable shop */
  .shop-scroll{
    max-height:280px;
    overflow-y:auto;
    width:100%;
    padding:2px;
    scrollbar-width:thin;
    scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .shop-scroll::-webkit-scrollbar{width:4px;}
  .shop-scroll::-webkit-scrollbar-track{background:transparent;}
  .shop-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
  
  .bird-demo{width:56px;height:46px;margin:0 auto;}
  
  #gameOverScreen .title{font-size:32px;color:#ff4444;}
  .game-over-subtitle{font-size:14px;color:rgba(255,255,255,0.6);margin-top:-4px;}
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    
    <div id="hud">0</div>
    <div id="best">🏆 BEST 0</div>
    <div id="keysDisplay">🔑 x3</div>
    <div id="diamondDisplay">💎 x0</div>

    <!-- MAIN MENU -->
    <div class="overlay" id="mainMenu">
      <div class="title">DUSK GLIDER</div>
      <div class="subtitle">⬇ endless flight ⬇</div>
      <svg class="bird-demo" viewBox="0 0 64 52"><ellipse cx="30" cy="27" rx="20" ry="17" fill="#ffd23f" stroke="#3b2412" stroke-width="2.2"/><path d="M10 30 Q17 21 24 27 Q17 33 8 32Z" fill="#ffb92e" stroke="#3b2412" stroke-width="1.8"/><circle cx="37" cy="20" r="9" fill="#fff" stroke="#3b2412" stroke-width="2.2"/><circle cx="39.5" cy="20" r="3.8" fill="#241914"/><circle cx="41" cy="18" r="1.1" fill="#fff"/><path d="M44 24 Q56 22 56 29 Q56 34 44 32 Z" fill="#ff7a3d" stroke="#3b2412" stroke-width="2.2"/><line x1="45" y1="28" x2="55" y2="28" stroke="#3b2412" stroke-width="1.4"/></svg>
      <button class="btn" id="playBtn">▶ PLAY</button>
      <button class="btn btn-secondary" id="shopBtn">🛒 SKINS</button>
      <div class="stat-row">
        <div class="stat"><div class="num" id="menuKeys">0</div><div class="lbl">🔑 keys</div></div>
        <div class="stat"><div class="num" id="menuDiamonds">0</div><div class="lbl">💎 diamonds</div></div>
        <div class="stat"><div class="num" id="menuBest">0</div><div class="lbl">best</div></div>
      </div>
      <div class="hint">tap / click / space to flap • collect keys & diamonds</div>
    </div>

    <!-- SHOP -->
    <div class="overlay hidden" id="shopScreen">
      <div class="title">🛒 SKIN SHOP</div>
      <div class="subtitle">collect skins with keys & diamonds</div>
      <div class="stat-row" style="gap:20px;margin:2px 0;">
        <div class="stat"><div class="num" id="shopKeys">0</div><div class="lbl">🔑 keys</div></div>
        <div class="stat"><div class="num" id="shopDiamonds">0</div><div class="lbl">💎 diamonds</div></div>
      </div>
      <div class="shop-scroll" id="shopGrid"></div>
      <div class="shop-nav">
        <button class="btn btn-secondary" id="shopBackBtn">← BACK</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div class="overlay hidden" id="gameOverScreen">
      <div class="title">💀 GROUNDED</div>
      <div class="game-over-subtitle">you crashed! what would you like to do?</div>
      <div class="stat-row">
        <div class="stat"><div class="num" id="finalScore">0</div><div class="lbl">score</div></div>
        <div class="stat"><div class="num" id="finalBest">0</div><div class="lbl">best</div></div>
      </div>
      <div class="respown-options">
        <button class="btn btn-gold" id="respownBtn">🔑 RESPAWN (1 key)</button>
        <button class="btn btn-secondary" id="goMenuBtn">🏠 MAIN MENU</button>
      </div>
      <div class="hint" id="respownHint">you have <span id="respownKeys">0</span> keys</div>
    </div>

  </div>
</div>

<script>
(function(){
  // ============================================================
  // SKIN SYSTEM
  // ============================================================
  const SKINS = [
    { id:'classic', name:'Classic', color:'#ffd23f', cost:0, currency:'none', default:true },
    { id:'pink', name:'Pink Dream', color:'#ff6b9d', cost:30, currency:'key' },
    { id:'blue', name:'Blue Ice', color:'#4fc3f7', cost:5, currency:'diamond' },
    { id:'purple', name:'Purple Haze', color:'#ab47bc', cost:60, currency:'key' },
    { id:'white', name:'White Angel', color:'#f5f5f5', cost:100, currency:'key' },
    { id:'gold', name:'Golden', color:'#ffd700', cost:15, currency:'diamond' },
    { id:'lava', name:'Lava', color:'#ff5722', cost:45, currency:'key' },
    { id:'emerald', name:'Emerald', color:'#00e676', cost:10, currency:'diamond' },
  ];

  let ownedSkins = ['classic'];
  let selectedSkin = 'classic';
  let keys = 3;
  let diamonds = 0;
  let bestScore = 0;

  // ============================================================
  // GAME STATE
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  
  let W, H, DPR;
  function resize(){
    const rect = canvas.getBoundingClientRect();
    DPR = window.devicePixelRatio || 1;
    W = rect.width; H = rect.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);

  function scaleVal(v){ return v * (W/380); }

  const GRAVITY = 0.42;
  const FLAP_VELOCITY = -8.2;
  const MAX_FALL = 11;
  const PIPE_GAP_BASE = 168;
  const PIPE_WIDTH = 64;
  const PIPE_SPEED = 2.6;
  const PIPE_INTERVAL = 1500;
  const GROUND_HEIGHT = 84;
  const KEY_PICKUP_R = 14;
  const DIAMOND_PICKUP_R = 16;

  let bird, pipes, score, state, lastPipeTime, frame, clouds, particles, hills;
  let pipesSinceKey, nextKeyIn, pipesSinceDiamond, nextDiamondIn;
  let gameActive = false;
  let currentSkinColor = '#ffd23f';
  let crashPending = false;

  function getSkinColor(id){
    const skin = SKINS.find(s=>s.id===id);
    return skin ? skin.color : '#ffd23f';
  }

  function initGame(){
    const skinColor = getSkinColor(selectedSkin);
    bird = {
      x: W*0.28, y: H*0.4, r: scaleVal(12.5),
      vy: 0, rot: 0, wingPhase: 0, flapBoost: 0, invuln: 0,
      color: skinColor
    };
    pipes = [];
    particles = [];
    score = 0; frame = 0; lastPipeTime = 0;
    pipesSinceKey = 0;
    nextKeyIn = 3 + Math.floor(Math.random()*2);
    pipesSinceDiamond = 0;
    nextDiamondIn = 10 + Math.floor(Math.random()*3);
    state = 'ready';
    crashPending = false;
    hud.textContent = '0';
    updateUI();
  }

  function updateUI(){
    document.getElementById('hud').textContent = score;
    document.getElementById('best').textContent = '🏆 BEST ' + bestScore;
    document.getElementById('keysDisplay').textContent = '🔑 x' + keys;
    document.getElementById('diamondDisplay').textContent = '💎 x' + diamonds;
    document.getElementById('menuKeys').textContent = keys;
    document.getElementById('menuDiamonds').textContent = diamonds;
    document.getElementById('menuBest').textContent = bestScore;
    document.getElementById('shopKeys').textContent = keys;
    document.getElementById('shopDiamonds').textContent = diamonds;
    document.getElementById('respownKeys').textContent = keys;
  }

  function initScenery(){
    clouds = [];
    for(let i=0;i<5;i++){
      clouds.push({ x: Math.random()*W, y: 30 + Math.random()*(H*0.35), scale: 0.6 + Math.random()*1.0, speed: 0.12 + Math.random()*0.2 });
    }
    hills = { farOffset:0, nearOffset:0 };
  }

  function spawnPipe(){
    const gap = Math.max(126, PIPE_GAP_BASE - Math.min(score,18)*2);
    const margin = 46;
    const usableH = H - GROUND_HEIGHT - margin*2;
    const topH = margin + Math.random()*(usableH - gap);
    
    pipesSinceKey++;
    pipesSinceDiamond++;
    let hasKey = false;
    let hasDiamond = false;
    
    if(pipesSinceKey >= nextKeyIn){
      hasKey = true;
      pipesSinceKey = 0;
      nextKeyIn = 3 + Math.floor(Math.random()*2);
    }
    if(pipesSinceDiamond >= nextDiamondIn){
      hasDiamond = true;
      pipesSinceDiamond = 0;
      nextDiamondIn = 10 + Math.floor(Math.random()*3);
    }
    
    pipes.push({
      x: W + PIPE_WIDTH,
      topH: topH,
      gap: gap,
      passed: false,
      hasKey: hasKey,
      keyCollected: false,
      hasDiamond: hasDiamond,
      diamondCollected: false
    });
  }

  function flap(){
    if(state === 'ready'){
      state = 'playing';
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('shopScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      lastPipeTime = performance.now();
      gameActive = true;
      crashPending = false;
    } else if(state === 'playing'){
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      spawnFeather();
    }
  }

  function spawnFeather(){
    for(let i=0;i<5;i++){
      particles.push({
        x: bird.x - bird.r*0.8,
        y: bird.y + (Math.random()-0.5)*bird.r,
        vx: -1.2 - Math.random()*1.6,
        vy: (Math.random()-0.5)*1.6,
        life: 26 + Math.random()*10,
        maxLife: 36,
        size: 1.6+Math.random()*2,
        color: bird.color || '#fff8e0'
      });
    }
  }

  function spawnSparkle(x,y,color='#ffe066'){
    for(let i=0;i<10;i++){
      const ang = Math.random()*Math.PI*2;
      particles.push({
        x:x, y:y,
        vx:Math.cos(ang)*2,
        vy:Math.sin(ang)*2,
        life:26, maxLife:26,
        size:2+Math.random()*2,
        color:color
      });
    }
  }

  function crash(){
    if(state !== 'playing') return;
    if(bird.invuln > 0) return;
    
    // Don't auto-use key - show game over screen with options
    state = 'falling';
    gameActive = false;
    crashPending = true;
  }

  function settle(){
    state = 'dead';
    gameActive = false;
    crashPending = false;
    if(score > bestScore){
      bestScore = score;
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = bestScore;
    document.getElementById('respownKeys').textContent = keys;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    updateUI();
  }

  function respawn(){
    if(keys > 0){
      keys--;
      updateUI();
      document.getElementById('gameOverScreen').classList.add('hidden');
      initGame();
      state = 'playing';
      gameActive = true;
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      lastPipeTime = performance.now();
      crashPending = false;
    }
  }

  function goToMenu(){
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    gameActive = false;
    state = 'ready';
    crashPending = false;
    updateUI();
  }

  function rectCircleCollide(cx, cy, cr, rx, ry, rw, rh){
    const closestX = Math.max(rx, Math.min(cx, rx+rw));
    const closestY = Math.max(ry, Math.min(cy, ry+rh));
    const dx = cx - closestX, dy = cy - closestY;
    return (dx*dx + dy*dy) < (cr*cr);
  }

  function update(now){
    frame++;
    clouds.forEach(c=>{ c.x -= c.speed; if(c.x < -70){ c.x = W+70; c.y = 30+Math.random()*(H*0.35); } });
    hills.farOffset -= 0.25; hills.nearOffset -= 0.55;

    bird.wingPhase += 0.18 + (state==='playing' ? 0.05 : 0);
    if(bird.flapBoost > 0) bird.flapBoost -= 0.06;
    if(bird.invuln > 0) bird.invuln--;

    if(state === 'falling'){
      bird.vy += GRAVITY;
      if(bird.vy > MAX_FALL) bird.vy = MAX_FALL;
      bird.y += bird.vy;
      bird.rot = Math.min(1.4, bird.rot + 0.06);
      if(bird.y + bird.r >= H - GROUND_HEIGHT){
        bird.y = H - GROUND_HEIGHT - bird.r;
        settle();
      }
      return;
    }

    if(state !== 'playing') return;

    bird.vy += GRAVITY;
    if(bird.vy > MAX_FALL) bird.vy = MAX_FALL;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.3, bird.vy/10));

    if(bird.y + bird.r > H - GROUND_HEIGHT){
      bird.y = H - GROUND_HEIGHT - bird.r;
      if(bird.invuln <= 0){ crash(); return; } else { bird.vy = Math.min(bird.vy, 0); }
    }
    if(bird.y - bird.r < 0){ bird.y = bird.r; bird.vy = 0; }

    if(now - lastPipeTime > PIPE_INTERVAL){ spawnPipe(); lastPipeTime = now; }

    pipes.forEach(p=>{
      p.x -= PIPE_SPEED;
      if(!p.passed && p.x + PIPE_WIDTH < bird.x - bird.r){
        p.passed = true;
        score++;
        hud.textContent = score;
      }

      if(bird.invuln <= 0){
        const botY = p.topH + p.gap;
        if(rectCircleCollide(bird.x, bird.y, bird.r*0.8, p.x, 0, PIPE_WIDTH, p.topH) ||
           rectCircleCollide(bird.x, bird.y, bird.r*0.8, p.x, botY, PIPE_WIDTH, H - botY - GROUND_HEIGHT)){
          crash();
        }
      }

      // Key pickup
      if(p.hasKey && !p.keyCollected){
        const keyX = p.x + PIPE_WIDTH/2;
        const keyY = p.topH + p.gap/2;
        const dx = bird.x - keyX, dy = bird.y - keyY;
        if(Math.sqrt(dx*dx+dy*dy) < bird.r + KEY_PICKUP_R){
          p.keyCollected = true;
          keys = Math.min(6, keys+1);
          updateUI();
          spawnSparkle(keyX, keyY, '#ffd700');
        }
      }

      // Diamond pickup
      if(p.hasDiamond && !p.diamondCollected){
        const diaX = p.x + PIPE_WIDTH/2;
        const diaY = p.topH + p.gap/2 + 40;
        const dx = bird.x - diaX, dy = bird.y - diaY;
        if(Math.sqrt(dx*dx+dy*dy) < bird.r + DIAMOND_PICKUP_R){
          p.diamondCollected = true;
          diamonds++;
          updateUI();
          spawnSparkle(diaX, diaY, '#00d4ff');
        }
      }
    });
    pipes = pipes.filter(p=>p.x > -PIPE_WIDTH-10);

    particles.forEach(pt=>{ pt.x += pt.vx; pt.y += pt.vy; pt.life--; });
    particles = particles.filter(pt=>pt.life>0);
  }

  // ============================================================
  // DRAWING
  // ============================================================
  function drawSky(){
    const grad = ctx.createLinearGradient(0,0,0,H-GROUND_HEIGHT);
    grad.addColorStop(0, '#1a2a4a');
    grad.addColorStop(0.4, '#3a6a7a');
    grad.addColorStop(0.7, '#6a9a8a');
    grad.addColorStop(1, '#8aba9a');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H-GROUND_HEIGHT);

    ctx.save();
    const moonX = W*0.82, moonY = H*0.15, moonR = scaleVal(28);
    const glow = ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*3);
    glow.addColorStop(0,'rgba(255,240,200,0.3)');
    glow.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(moonX,moonY,moonR*3,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f0e8d0';
    ctx.beginPath();
    ctx.arc(moonX,moonY,moonR,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Stars
    ctx.save();
    for(let i=0;i<30;i++){
      const sx = (i*137 + 50) % W;
      const sy = (i*97 + 20) % (H*0.5);
      const bright = 0.3 + Math.sin(frame*0.02 + i)*0.3;
      ctx.fillStyle = `rgba(255,255,255,${bright})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.5+Math.random()*0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawHillLayer(offset, color, baseY, amp, wavelength){
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H-GROUND_HEIGHT);
    for(let x=0; x<=W; x+=10){
      const y = baseY - Math.sin((x+offset)/wavelength)*amp - Math.sin((x+offset)/(wavelength*2.3))*amp*0.5;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W, H-GROUND_HEIGHT);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawClouds(){
    ctx.save();
    clouds.forEach(c=>{
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.scale(c.scale, c.scale);
      ctx.fillStyle = 'rgba(200,220,240,0.15)';
      ctx.beginPath();
      ctx.ellipse(2,2,28,15,0,0,Math.PI*2);
      ctx.ellipse(20,-4,17,12,0,0,Math.PI*2);
      ctx.ellipse(-18,-2,16,11,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(220,240,255,0.25)';
      ctx.beginPath();
      ctx.ellipse(0,0,26,14,0,0,Math.PI*2);
      ctx.ellipse(18,-6,16,11,0,0,Math.PI*2);
      ctx.ellipse(-18,-4,15,10,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    ctx.restore();
  }

  function drawPipe(p){
    ctx.save();
    const capH = 26;
    function segment(x,y,w,h){
      const g = ctx.createLinearGradient(x,0,x+w,0);
      g.addColorStop(0, '#2a5a2a');
      g.addColorStop(0.18, '#4a8a4a');
      g.addColorStop(0.5, '#5aaa5a');
      g.addColorStop(0.82, '#4a8a4a');
      g.addColorStop(1, '#2a5a2a');
      ctx.fillStyle = g;
      ctx.fillRect(x,y,w,h);
      ctx.strokeStyle = 'rgba(20,50,20,0.3)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x+1,y,w-2,h);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x+w*0.15, y, w*0.12, h);
    }
    segment(p.x, 0, PIPE_WIDTH, p.topH-capH);
    segment(p.x-5, p.topH-capH, PIPE_WIDTH+10, capH);
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(p.x-5, p.topH-4, PIPE_WIDTH+10, 4);

    const botY = p.topH+p.gap;
    segment(p.x, botY+capH, PIPE_WIDTH, H-GROUND_HEIGHT-(botY+capH));
    segment(p.x-5, botY, PIPE_WIDTH+10, capH);
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(p.x-5, botY+capH, PIPE_WIDTH+10, 4);
    ctx.restore();

    // Draw key
    if(p.hasKey && !p.keyCollected){
      const keyX = p.x + PIPE_WIDTH/2;
      const keyY = p.topH + p.gap/2 + Math.sin(frame*0.08 + p.topH)*5;
      ctx.save();
      const glow = ctx.createRadialGradient(keyX,keyY,0,keyX,keyY,KEY_PICKUP_R*2.2);
      glow.addColorStop(0,'rgba(255,215,0,0.4)');
      glow.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(keyX,keyY,KEY_PICKUP_R*2.2,0,Math.PI*2);
      ctx.fill();
      ctx.font = (KEY_PICKUP_R*1.8)+'px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('🔑', keyX, keyY);
      ctx.restore();
    }

    // Draw diamond
    if(p.hasDiamond && !p.diamondCollected){
      const diaX = p.x + PIPE_WIDTH/2;
      const diaY = p.topH + p.gap/2 + 40 + Math.sin(frame*0.06 + p.topH + 1)*6;
      ctx.save();
      const glow = ctx.createRadialGradient(diaX,diaY,0,diaX,diaY,DIAMOND_PICKUP_R*2.2);
      glow.addColorStop(0,'rgba(0,212,255,0.4)');
      glow.addColorStop(1,'rgba(0,212,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(diaX,diaY,DIAMOND_PICKUP_R*2.2,0,Math.PI*2);
      ctx.fill();
      ctx.font = (DIAMOND_PICKUP_R*1.8)+'px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('💎', diaX, diaY);
      ctx.restore();
    }
  }

  function drawGround(){
    ctx.save();
    const gy = H - GROUND_HEIGHT;
    const grad = ctx.createLinearGradient(0,gy,0,H);
    grad.addColorStop(0,'#8a7a4a');
    grad.addColorStop(0.15,'#6a5a3a');
    grad.addColorStop(1,'#3a2a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, GROUND_HEIGHT);

    ctx.fillStyle = '#6a9a4a';
    ctx.fillRect(0, gy, W, 10);
    ctx.fillStyle = '#5a8a3a';
    const stripeW = 22;
    const offset = (frame*PIPE_SPEED) % stripeW;
    for(let x=-stripeW; x<W+stripeW; x+=stripeW){
      ctx.beginPath();
      ctx.moveTo(x-offset, gy+10);
      ctx.lineTo(x-offset+10, gy);
      ctx.lineTo(x-offset+16, gy);
      ctx.lineTo(x-offset+6, gy+10);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSpeedLines(){
    if(state!=='playing') return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    for(let i=0;i<3;i++){
      const off = (frame*4 + i*30) % 60;
      const ly = bird.y + (i-1)*bird.r*0.7;
      const lx = bird.x - bird.r*1.4 - off;
      ctx.globalAlpha = 0.3 - off/180;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx-15, ly);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBird(){
    ctx.save();
    if(bird.invuln > 0 && Math.floor(bird.invuln/5)%2===0){ ctx.globalAlpha = 0.4; }
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);
    const r = bird.r;
    const wing = Math.sin(bird.wingPhase) * (0.5 + bird.flapBoost*0.9);
    const outline = '#2a1a0a';
    const color = bird.color || '#ffd23f';

    ctx.fillStyle = color;
    ctx.strokeStyle = outline;
    ctx.lineWidth = Math.max(1.6, r*0.14);
    ctx.beginPath();
    ctx.ellipse(0,0, r*1.15, r*1.02, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // Wing
    ctx.save();
    ctx.translate(-r*0.15, r*0.15);
    ctx.rotate(wing*0.5);
    const wingColor = darkenColor(color, 20);
    ctx.fillStyle = wingColor;
    ctx.beginPath();
    ctx.moveTo(-r*0.85, r*0.05);
    ctx.quadraticCurveTo(-r*0.15, -r*0.55 + wing*r*0.3, r*0.35, r*0.05);
    ctx.quadraticCurveTo(-r*0.15, r*0.55 + wing*r*0.15, -r*0.85, r*0.05);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Eye
    const eyeX = r*0.42, eyeY = -r*0.32, eyeR = r*0.5;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeR, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    const pupilOffset = Math.max(-0.3, Math.min(0.3, bird.vy/20));
    ctx.fillStyle = '#1a0a0a';
    ctx.beginPath();
    ctx.arc(eyeX + eyeR*0.28, eyeY + eyeR*0.15 + pupilOffset*eyeR*0.4, eyeR*0.42, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(eyeX + eyeR*0.42, eyeY - eyeR*0.05, eyeR*0.14, 0, Math.PI*2);
    ctx.fill();

    // Beak
    const bx = r*0.75, by = r*0.05;
    ctx.fillStyle = '#ff7a3d';
    ctx.beginPath();
    ctx.moveTo(bx, by-r*0.28);
    ctx.quadraticCurveTo(r*1.55, by-r*0.32, r*1.6, by);
    ctx.quadraticCurveTo(r*1.55, by+r*0.32, bx, by+r*0.28);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,26,10,0.5)';
    ctx.beginPath();
    ctx.moveTo(bx+r*0.05, by);
    ctx.lineTo(r*1.5, by);
    ctx.lineWidth = Math.max(1.2, r*0.09);
    ctx.stroke();

    ctx.restore();
  }

  function darkenColor(hex, amount){
    let c = hex.replace('#','');
    if(c.length===3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    let r = parseInt(c.substring(0,2),16);
    let g = parseInt(c.substring(2,4),16);
    let b = parseInt(c.substring(4,6),16);
    r = Math.max(0, r - amount);
    g = Math.max(0, g - amount);
    b = Math.max(0, b - amount);
    return `rgb(${r},${g},${b})`;
  }

  function drawParticles(){
    ctx.save();
    particles.forEach(pt=>{
      ctx.globalAlpha = Math.max(0, pt.life/pt.maxLife);
      ctx.fillStyle = pt.color || '#fff8e0';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawClouds();
    drawHillLayer(hills.farOffset, 'rgba(60,120,80,0.4)', H-GROUND_HEIGHT-18, 14, 90);
    drawHillLayer(hills.nearOffset, 'rgba(40,100,60,0.5)', H-GROUND_HEIGHT-6, 10, 60);
    pipes.forEach(drawPipe);
    drawSpeedLines();
    drawParticles();
    drawBird();
    drawGround();
  }

  // ============================================================
  // SHOP
  // ============================================================
  function renderShop(){
    const grid = document.getElementById('shopGrid');
    grid.innerHTML = '';
    SKINS.forEach(skin => {
      const div = document.createElement('div');
      div.className = 'shop-item';
      const owned = ownedSkins.includes(skin.id);
      const selected = selectedSkin === skin.id;
      if(owned) div.classList.add('owned');
      if(selected) div.classList.add('selected');
      
      // Bird preview
      const preview = document.createElement('div');
      preview.className = 'bird-preview';
      preview.innerHTML = `
        <svg viewBox="0 0 64 52">
          <ellipse cx="30" cy="27" rx="20" ry="17" fill="${skin.color}" stroke="#2a1a0a" stroke-width="2"/>
          <path d="M10 30 Q17 21 24 27 Q17 33 8 32Z" fill="${darkenColor(skin.color, 30)}" stroke="#2a1a0a" stroke-width="1.5"/>
          <circle cx="37" cy="20" r="9" fill="#fff" stroke="#2a1a0a" stroke-width="2"/>
          <circle cx="39.5" cy="20" r="3.8" fill="#1a0a0a"/>
          <circle cx="41" cy="18" r="1.1" fill="#fff"/>
          <path d="M44 24 Q56 22 56 29 Q56 34 44 32 Z" fill="#ff7a3d" stroke="#2a1a0a" stroke-width="2"/>
          <line x1="45" y1="28" x2="55" y2="28" stroke="#2a1a0a" stroke-width="1.2"/>
        </svg>
      `;
      
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = skin.name;
      
      const price = document.createElement('div');
      price.className = 'price';
      if(owned){
        price.innerHTML = '<span class="owned-badge">✓ OWNED</span>';
      } else if(skin.cost === 0){
        price.textContent = 'FREE';
      } else if(skin.currency === 'key'){
        price.innerHTML = `<span class="key-icon">🔑</span> ${skin.cost}`;
      } else if(skin.currency === 'diamond'){
        price.innerHTML = `<span class="diamond-icon">💎</span> ${skin.cost}`;
      }
      
      div.appendChild(preview);
      div.appendChild(name);
      div.appendChild(price);
      
      div.addEventListener('click', () => {
        if(owned){
          selectedSkin = skin.id;
          document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          updateUI();
          renderShop();
          return;
        }
        // Try to buy
        if(skin.currency === 'key' && keys >= skin.cost){
          keys -= skin.cost;
          ownedSkins.push(skin.id);
          selectedSkin = skin.id;
          updateUI();
          renderShop();
        } else if(skin.currency === 'diamond' && diamonds >= skin.cost){
          diamonds -= skin.cost;
          ownedSkins.push(skin.id);
          selectedSkin = skin.id;
          updateUI();
          renderShop();
        } else {
          // Not enough currency
          div.style.borderColor = '#ff4444';
          div.style.background = 'rgba(255,0,0,0.1)';
          setTimeout(() => {
            div.style.borderColor = '';
            div.style.background = '';
          }, 300);
        }
      });
      
      grid.appendChild(div);
    });
  }

  // ============================================================
  // LOOP
  // ============================================================
  function loop(now){
    update(now);
    render();
    requestAnimationFrame(loop);
  }

  // ============================================================
  // EVENT LISTENERS
  // ============================================================
  function handleInput(e){
    if(e){ e.preventDefault(); }
    if(state === 'dead' || state === 'falling') return;
    if(!gameActive) return;
    flap();
  }

  canvas.addEventListener('pointerdown', handleInput);
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code==='ArrowUp' || e.key===' '){
      e.preventDefault();
      handleInput(e);
    }
  });

  // Menu buttons
  document.getElementById('playBtn').addEventListener('click', () => {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    initGame();
    state = 'ready';
    gameActive = true;
  });

  document.getElementById('shopBtn').addEventListener('click', () => {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('shopScreen').classList.remove('hidden');
    renderShop();
    updateUI();
  });

  document.getElementById('shopBackBtn').addEventListener('click', () => {
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    updateUI();
  });

  document.getElementById('respownBtn').addEventListener('click', respawn);
  document.getElementById('goMenuBtn').addEventListener('click', goToMenu);

  // ============================================================
  // INIT
  // ============================================================
  resize();
  initScenery();
  initGame();
  updateUI();
  document.getElementById('mainMenu').classList.remove('hidden');
  requestAnimationFrame(loop);

  console.log('🛒 Dusk Glider — Skins & Shop Edition');
  console.log('Collect keys 🔑 and diamonds 💎 to unlock new bird skins!');
  console.log('When you crash, choose to respawn with a key or return to menu.');
})();
</script>
</body>
