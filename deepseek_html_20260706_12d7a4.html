<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dusk Glider — Skins & Shop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700;900&display=swap');
  
  :root{
    --accent:#ffb84d;
    --bg-dark:#0a0612;
    --card-bg:rgba(20,30,50,0.85);
    --gold:#ffd700;
    --diamond:#00d4ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg-dark);
    font-family:'Exo 2','Segoe UI',sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    height:100vh;
    color:#fff;
    touch-action:none;
  }
  #wrap{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    width:100vw;
    height:100vh;
    max-width:480px;
    max-height:800px;
    background:radial-gradient(ellipse at center, #1a2a3a, #0a0f1a);
    overflow:hidden;
    border-radius:0;
    box-shadow:0 0 60px rgba(0,0,0,0.8);
  }
  @media (min-width:481px){
    #stage{border-radius:8px;}
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    touch-action:none;
  }
  
  /* HUD */
  #hud{
    position:absolute;
    top:12px;
    left:0;right:0;
    text-align:center;
    font-family:'Orbitron',monospace;
    font-size:32px;
    font-weight:900;
    color:#fff;
    text-shadow:0 0 20px rgba(255,200,50,0.3),0 4px 0 rgba(0,0,0,0.5);
    pointer-events:none;
    z-index:5;
    letter-spacing:2px;
  }
  @media (max-width:400px){#hud{font-size:26px;}}
  
  #best{
    position:absolute;
    top:50px;
    left:0;right:0;
    text-align:center;
    font-family:'Exo 2',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    pointer-events:none;
    z-index:5;
  }
  @media (max-width:400px){#best{top:44px;font-size:10px;}}
  
  #keysDisplay{
    position:absolute;
    top:10px;
    left:10px;
    font-family:'Exo 2',sans-serif;
    font-size:14px;
    font-weight:700;
    color:#ffd700;
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    z-index:5;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(0,0,0,0.4);
    padding:3px 10px;
    border-radius:16px;
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,215,0,0.2);
  }
  #diamondDisplay{
    position:absolute;
    top:10px;
    right:10px;
    font-family:'Exo 2',sans-serif;
    font-size:14px;
    font-weight:700;
    color:#00d4ff;
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
    z-index:5;
    pointer-events:none;
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(0,0,0,0.4);
    padding:3px 10px;
    border-radius:16px;
    backdrop-filter:blur(4px);
    border:1px solid rgba(0,212,255,0.2);
  }
  @media (max-width:400px){
    #keysDisplay{font-size:12px;padding:2px 8px;top:8px;left:8px;}
    #diamondDisplay{font-size:12px;padding:2px 8px;top:8px;right:8px;}
  }

  /* Overlays */
  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-align:center;
    z-index:10;
    padding:16px;
    background:radial-gradient(ellipse at center, rgba(10,6,18,0.7) 0%, rgba(10,6,18,0.95) 100%);
    backdrop-filter:blur(6px);
  }
  .hidden{display:none !important;}
  
  .title{
    font-family:'Orbitron',monospace;
    font-size:32px;
    font-weight:900;
    color:var(--accent);
    text-shadow:0 0 40px rgba(255,184,77,0.3),0 4px 0 rgba(0,0,0,0.5);
    letter-spacing:3px;
  }
  @media (max-width:400px){.title{font-size:26px;}}
  
  .subtitle{
    font-family:'Exo 2',sans-serif;
    font-size:11px;
    font-weight:600;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.5);
    margin-top:-2px;
  }
  .btn{
    font-family:'Exo 2',sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    padding:12px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:all 0.1s;
    background:linear-gradient(180deg, var(--accent), #ff9a3c);
    color:#1a0a0a;
    box-shadow:0 4px 0 #b8631f,0 10px 30px rgba(0,0,0,0.5);
    touch-action:manipulation;
    min-height:48px;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b8631f,0 4px 15px rgba(0,0,0,0.4);}
  .btn-secondary{
    background:linear-gradient(180deg, #4a6a8a, #2a4a6a);
    box-shadow:0 4px 0 #1a2a3a;
    color:#fff;
  }
  .btn-secondary:active{box-shadow:0 1px 0 #1a2a3a;}
  .btn-gold{
    background:linear-gradient(180deg, #ffd700, #f0a500);
    box-shadow:0 4px 0 #b87a00;
    color:#1a0a0a;
  }
  .btn-gold:active{box-shadow:0 1px 0 #b87a00;}
  
  .stat-row{display:flex;gap:20px;margin:4px 0;}
  .stat{display:flex;flex-direction:column;align-items:center;}
  .stat .num{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#fff;}
  .stat .lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);}
  @media (max-width:400px){.stat .num{font-size:18px;}}
  
  .hint{
    font-family:'Exo 2',sans-serif;
    font-size:11px;
    color:rgba(255,255,255,0.4);
    letter-spacing:1px;
    max-width:280px;
    line-height:1.6;
  }
  
  /* Shop */
  #shopScreen .title{font-size:24px;}
  @media (max-width:400px){#shopScreen .title{font-size:20px;}}
  
  .shop-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    width:100%;
    max-width:380px;
    margin:2px 0;
  }
  .shop-item{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    padding:10px 6px;
    text-align:center;
    cursor:pointer;
    transition:all 0.2s;
    backdrop-filter:blur(4px);
    touch-action:manipulation;
    min-height:80px;
  }
  .shop-item:active{transform:scale(0.95);}
  .shop-item.owned{border-color:rgba(0,255,100,0.3);background:rgba(0,255,100,0.05);}
  .shop-item.selected{border-color:var(--accent);background:rgba(255,184,77,0.1);box-shadow:0 0 20px rgba(255,184,77,0.1);}
  .shop-item .bird-preview{
    width:40px;
    height:32px;
    margin:0 auto 2px;
  }
  .shop-item .bird-preview svg{width:100%;height:100%;}
  .shop-item .name{
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .shop-item .price{
    font-size:9px;
    color:rgba(255,255,255,0.5);
    margin-top:2px;
  }
  .shop-item .price .key-icon{color:#ffd700;}
  .shop-item .price .diamond-icon{color:#00d4ff;}
  .shop-item .owned-badge{
    font-size:8px;
    color:#00ff64;
    font-weight:700;
    letter-spacing:1px;
  }
  
  .shop-nav{
    display:flex;
    gap:10px;
    margin-top:2px;
  }
  .shop-nav .btn{font-size:11px;padding:8px 20px;min-height:40px;}
  
  .respown-options{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:2px;
    width:100%;
    max-width:280px;
  }
  .respown-options .btn{font-size:12px;padding:10px 20px;width:100%;min-height:44px;}
  
  .shop-scroll{
    max-height:220px;
    overflow-y:auto;
    width:100%;
    padding:2px;
    scrollbar-width:thin;
    scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .shop-scroll::-webkit-scrollbar{width:3px;}
  .shop-scroll::-webkit-scrollbar-track{background:transparent;}
  .shop-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}
  
  .bird-demo{width:48px;height:40px;margin:0 auto;}
  #gameOverScreen .title{font-size:28px;color:#ff4444;}
  @media (max-width:400px){#gameOverScreen .title{font-size:22px;}}
  
  .game-over-subtitle{font-size:12px;color:rgba(255,255,255,0.6);margin-top:-2px;}
  
  /* Mobile friendly buttons */
  @media (max-width:480px){
    .btn{padding:10px 20px;font-size:12px;min-height:44px;}
    .shop-nav .btn{font-size:10px;padding:6px 16px;min-height:36px;}
    .respown-options .btn{font-size:11px;padding:8px 16px;min-height:40px;}
    .stat-row{gap:14px;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>
    
    <div id="hud">0</div>
    <div id="best">🏆 BEST 0</div>
    <div id="keysDisplay">🔑 x3</div>
    <div id="diamondDisplay">💎 x0</div>

    <!-- MAIN MENU -->
    <div class="overlay" id="mainMenu">
      <div class="title">DUSK GLIDER</div>
      <div class="subtitle">⬇ endless flight ⬇</div>
      <svg class="bird-demo" viewBox="0 0 64 52"><ellipse cx="30" cy="27" rx="20" ry="17" fill="#ffd23f" stroke="#3b2412" stroke-width="2.2"/><path d="M10 30 Q17 21 24 27 Q17 33 8 32Z" fill="#ffb92e" stroke="#3b2412" stroke-width="1.8"/><circle cx="37" cy="20" r="9" fill="#fff" stroke="#3b2412" stroke-width="2.2"/><circle cx="39.5" cy="20" r="3.8" fill="#241914"/><circle cx="41" cy="18" r="1.1" fill="#fff"/><path d="M44 24 Q56 22 56 29 Q56 34 44 32 Z" fill="#ff7a3d" stroke="#3b2412" stroke-width="2.2"/><line x1="45" y1="28" x2="55" y2="28" stroke="#3b2412" stroke-width="1.4"/></svg>
      <button class="btn" id="playBtn">▶ PLAY</button>
      <button class="btn btn-secondary" id="shopBtn">🛒 SKINS</button>
      <div class="stat-row">
        <div class="stat"><div class="num" id="menuKeys">0</div><div class="lbl">🔑 keys</div></div>
        <div class="stat"><div class="num" id="menuDiamonds">0</div><div class="lbl">💎 diamonds</div></div>
        <div class="stat"><div class="num" id="menuBest">0</div><div class="lbl">best</div></div>
      </div>
      <div class="hint">tap / click / space to flap • collect keys & diamonds</div>
    </div>

    <!-- SHOP -->
    <div class="overlay hidden" id="shopScreen">
      <div class="title">🛒 SKIN SHOP</div>
      <div class="subtitle">collect skins with keys & diamonds</div>
      <div class="stat-row" style="gap:16px;margin:2px 0;">
        <div class="stat"><div class="num" id="shopKeys">0</div><div class="lbl">🔑 keys</div></div>
        <div class="stat"><div class="num" id="shopDiamonds">0</div><div class="lbl">💎 diamonds</div></div>
      </div>
      <div class="shop-scroll" id="shopGrid"></div>
      <div class="shop-nav">
        <button class="btn btn-secondary" id="shopBackBtn">← BACK</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div class="overlay hidden" id="gameOverScreen">
      <div class="title">💀 GROUNDED</div>
      <div class="game-over-subtitle">you crashed! what would you like to do?</div>
      <div class="stat-row">
        <div class="stat"><div class="num" id="finalScore">0</div><div class="lbl">score</div></div>
        <div class="stat"><div class="num" id="finalBest">0</div><div class="lbl">best</div></div>
      </div>
      <div class="respown-options">
        <button class="btn btn-gold" id="respownBtn">🔑 RESPAWN (1 key)</button>
        <button class="btn btn-secondary" id="goMenuBtn">🏠 MAIN MENU</button>
      </div>
      <div class="hint" id="respownHint">you have <span id="respownKeys">0</span> keys</div>
    </div>

  </div>
</div>

<script>
(function(){
  // ============================================================
  // SKIN SYSTEM
  // ============================================================
  const SKINS = [
    { id:'classic', name:'Classic', color:'#ffd23f', cost:0, currency:'none', default:true },
    { id:'pink', name:'Pink Dream', color:'#ff6b9d', cost:30, currency:'key' },
    { id:'blue', name:'Blue Ice', color:'#4fc3f7', cost:5, currency:'diamond' },
    { id:'purple', name:'Purple Haze', color:'#ab47bc', cost:60, currency:'key' },
    { id:'white', name:'White Angel', color:'#f5f5f5', cost:100, currency:'key' },
    { id:'gold', name:'Golden', color:'#ffd700', cost:15, currency:'diamond' },
    { id:'lava', name:'Lava', color:'#ff5722', cost:45, currency:'key' },
    { id:'emerald', name:'Emerald', color:'#00e676', cost:10, currency:'diamond' },
  ];

  let ownedSkins = ['classic'];
  let selectedSkin = 'classic';
  let keys = 3;
  let diamonds = 0;
  let bestScore = 0;
  const MAX_KEYS = 1000;
  const MAX_DIAMONDS = 1000;

  // ============================================================
  // GAME STATE
  // ============================================================
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  
  let W, H, DPR;
  let isMobile = false;
  
  function resize(){
    const rect = canvas.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2); // Cap DPR for performance
    W = rect.width; 
    H = rect.height;
    canvas.width = W * DPR; 
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    isMobile = W < 600 || 'ontouchstart' in window;
  }
  window.addEventListener('resize', resize);

  function scaleVal(v){ return v * (W/380); }

  const GRAVITY = 0.38;
  const FLAP_VELOCITY = -7.5;
  const MAX_FALL = 10;
  const PIPE_GAP_BASE = 155;
  const PIPE_WIDTH = 56;
  const PIPE_SPEED = 2.4;
  const PIPE_INTERVAL = 1400;
  const GROUND_HEIGHT = 72;
  const KEY_PICKUP_R = 13;
  const DIAMOND_PICKUP_R = 15;

  let bird, pipes, score, state, lastPipeTime, frame, clouds, particles, hills;
  let pipesSinceKey, nextKeyIn, pipesSinceDiamond, nextDiamondIn;
  let gameActive = false;
  let crashPending = false;
  let animFrameId = null;

  function getSkinColor(id){
    const skin = SKINS.find(s=>s.id===id);
    return skin ? skin.color : '#ffd23f';
  }

  function initGame(){
    const skinColor = getSkinColor(selectedSkin);
    bird = {
      x: W*0.28, y: H*0.4, r: scaleVal(11.5),
      vy: 0, rot: 0, wingPhase: 0, flapBoost: 0, invuln: 0,
      color: skinColor
    };
    pipes = [];
    particles = [];
    score = 0; frame = 0; lastPipeTime = 0;
    pipesSinceKey = 0;
    nextKeyIn = 3 + Math.floor(Math.random()*2);
    pipesSinceDiamond = 0;
    nextDiamondIn = 8 + Math.floor(Math.random()*3);
    state = 'ready';
    crashPending = false;
    hud.textContent = '0';
    updateUI();
  }

  function updateUI(){
    document.getElementById('hud').textContent = score;
    document.getElementById('best').textContent = '🏆 BEST ' + bestScore;
    document.getElementById('keysDisplay').textContent = '🔑 x' + keys;
    document.getElementById('diamondDisplay').textContent = '💎 x' + diamonds;
    document.getElementById('menuKeys').textContent = keys;
    document.getElementById('menuDiamonds').textContent = diamonds;
    document.getElementById('menuBest').textContent = bestScore;
    document.getElementById('shopKeys').textContent = keys;
    document.getElementById('shopDiamonds').textContent = diamonds;
    document.getElementById('respownKeys').textContent = keys;
  }

  function initScenery(){
    clouds = [];
    const cloudCount = isMobile ? 4 : 6;
    for(let i=0;i<cloudCount;i++){
      clouds.push({ 
        x: Math.random()*W, 
        y: 20 + Math.random()*(H*0.3), 
        scale: 0.4 + Math.random()*0.7, 
        speed: 0.08 + Math.random()*0.15 
      });
    }
    hills = { farOffset:0, nearOffset:0 };
  }

  function spawnPipe(){
    const gap = Math.max(120, PIPE_GAP_BASE - Math.min(score,16)*2);
    const margin = 40;
    const usableH = H - GROUND_HEIGHT - margin*2;
    const topH = margin + Math.random()*(usableH - gap);
    
    pipesSinceKey++;
    pipesSinceDiamond++;
    let hasKey = false;
    let hasDiamond = false;
    
    if(pipesSinceKey >= nextKeyIn && keys < MAX_KEYS){
      hasKey = true;
      pipesSinceKey = 0;
      nextKeyIn = 3 + Math.floor(Math.random()*2);
    }
    if(pipesSinceDiamond >= nextDiamondIn && diamonds < MAX_DIAMONDS){
      hasDiamond = true;
      pipesSinceDiamond = 0;
      nextDiamondIn = 8 + Math.floor(Math.random()*3);
    }
    
    pipes.push({
      x: W + PIPE_WIDTH,
      topH: topH,
      gap: gap,
      passed: false,
      hasKey: hasKey,
      keyCollected: false,
      hasDiamond: hasDiamond,
      diamondCollected: false
    });
  }

  function flap(){
    if(state === 'ready'){
      state = 'playing';
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('shopScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      lastPipeTime = performance.now();
      gameActive = true;
      crashPending = false;
    } else if(state === 'playing'){
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      spawnFeather();
    }
  }

  function spawnFeather(){
    const count = isMobile ? 3 : 5;
    for(let i=0;i<count;i++){
      particles.push({
        x: bird.x - bird.r*0.8,
        y: bird.y + (Math.random()-0.5)*bird.r,
        vx: -0.8 - Math.random()*1.2,
        vy: (Math.random()-0.5)*1.2,
        life: 20 + Math.random()*8,
        maxLife: 28,
        size: 1.2+Math.random()*1.6,
        color: bird.color || '#fff8e0'
      });
    }
  }

  function spawnSparkle(x,y,color='#ffe066'){
    const count = isMobile ? 6 : 10;
    for(let i=0;i<count;i++){
      const ang = Math.random()*Math.PI*2;
      particles.push({
        x:x, y:y,
        vx:Math.cos(ang)*(1.5 + Math.random()*1.5),
        vy:Math.sin(ang)*(1.5 + Math.random()*1.5),
        life:18 + Math.random()*8,
        maxLife:26,
        size:1.5+Math.random()*2,
        color:color
      });
    }
  }

  function crash(){
    if(state !== 'playing') return;
    if(bird.invuln > 0) return;
    state = 'falling';
    gameActive = false;
    crashPending = true;
  }

  function settle(){
    state = 'dead';
    gameActive = false;
    crashPending = false;
    if(score > bestScore){
      bestScore = score;
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalBest').textContent = bestScore;
    document.getElementById('respownKeys').textContent = keys;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    updateUI();
  }

  function respawn(){
    if(keys > 0){
      keys--;
      updateUI();
      document.getElementById('gameOverScreen').classList.add('hidden');
      initGame();
      state = 'playing';
      gameActive = true;
      bird.vy = FLAP_VELOCITY;
      bird.flapBoost = 1;
      lastPipeTime = performance.now();
      crashPending = false;
    }
  }

  function goToMenu(){
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    gameActive = false;
    state = 'ready';
    crashPending = false;
    updateUI();
  }

  function rectCircleCollide(cx, cy, cr, rx, ry, rw, rh){
    const closestX = Math.max(rx, Math.min(cx, rx+rw));
    const closestY = Math.max(ry, Math.min(cy, ry+rh));
    const dx = cx - closestX, dy = cy - closestY;
    return (dx*dx + dy*dy) < (cr*cr);
  }

  function update(now){
    frame++;
    
    // Optimize cloud updates
    for(let i=0;i<clouds.length;i++){
      const c = clouds[i];
      c.x -= c.speed;
      if(c.x < -70){ c.x = W+70; c.y = 20+Math.random()*(H*0.3); }
    }
    hills.farOffset -= 0.2; 
    hills.nearOffset -= 0.4;

    bird.wingPhase += 0.18 + (state==='playing' ? 0.05 : 0);
    if(bird.flapBoost > 0) bird.flapBoost -= 0.06;
    if(bird.invuln > 0) bird.invuln--;

    if(state === 'falling'){
      bird.vy += GRAVITY;
      if(bird.vy > MAX_FALL) bird.vy = MAX_FALL;
      bird.y += bird.vy;
      bird.rot = Math.min(1.4, bird.rot + 0.06);
      if(bird.y + bird.r >= H - GROUND_HEIGHT){
        bird.y = H - GROUND_HEIGHT - bird.r;
        settle();
      }
      return;
    }

    if(state !== 'playing') return;

    bird.vy += GRAVITY;
    if(bird.vy > MAX_FALL) bird.vy = MAX_FALL;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.3, bird.vy/10));

    if(bird.y + bird.r > H - GROUND_HEIGHT){
      bird.y = H - GROUND_HEIGHT - bird.r;
      if(bird.invuln <= 0){ crash(); return; } else { bird.vy = Math.min(bird.vy, 0); }
    }
    if(bird.y - bird.r < 0){ bird.y = bird.r; bird.vy = 0; }

    if(now - lastPipeTime > PIPE_INTERVAL){ 
      spawnPipe(); 
      lastPipeTime = now; 
    }

    // Optimize pipe updates
    const birdX = bird.x;
    const birdY = bird.y;
    const birdR = bird.r * 0.8;
    
    for(let i=pipes.length-1; i>=0; i--){
      const p = pipes[i];
      p.x -= PIPE_SPEED;
      
      if(!p.passed && p.x + PIPE_WIDTH < birdX - bird.r){
        p.passed = true;
        score++;
        hud.textContent = score;
      }

      if(bird.invuln <= 0){
        const botY = p.topH + p.gap;
        if(rectCircleCollide(birdX, birdY, birdR, p.x, 0, PIPE_WIDTH, p.topH) ||
           rectCircleCollide(birdX, birdY, birdR, p.x, botY, PIPE_WIDTH, H - botY - GROUND_HEIGHT)){
          crash();
        }
      }

      // Key pickup
      if(p.hasKey && !p.keyCollected && keys < MAX_KEYS){
        const keyX = p.x + PIPE_WIDTH/2;
        const keyY = p.topH + p.gap/2;
        const dx = birdX - keyX, dy = birdY - keyY;
        if(Math.sqrt(dx*dx+dy*dy) < bird.r + KEY_PICKUP_R){
          p.keyCollected = true;
          keys = Math.min(MAX_KEYS, keys+1);
          updateUI();
          spawnSparkle(keyX, keyY, '#ffd700');
        }
      }

      // Diamond pickup
      if(p.hasDiamond && !p.diamondCollected && diamonds < MAX_DIAMONDS){
        const diaX = p.x + PIPE_WIDTH/2;
        const diaY = p.topH + p.gap/2 + 35;
        const dx = birdX - diaX, dy = birdY - diaY;
        if(Math.sqrt(dx*dx+dy*dy) < bird.r + DIAMOND_PICKUP_R){
          p.diamondCollected = true;
          diamonds = Math.min(MAX_DIAMONDS, diamonds+1);
          updateUI();
          spawnSparkle(diaX, diaY, '#00d4ff');
        }
      }
      
      // Remove offscreen pipes
      if(p.x < -PIPE_WIDTH - 20){
        pipes.splice(i, 1);
      }
    }

    // Update particles
    for(let i=particles.length-1; i>=0; i--){
      const pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.life--;
      if(pt.life <= 0){
        particles.splice(i, 1);
      }
    }
  }

  // ============================================================
  // DRAWING (optimized)
  // ============================================================
  function drawSky(){
    const grad = ctx.createLinearGradient(0,0,0,H-GROUND_HEIGHT);
    grad.addColorStop(0, '#1a2a4a');
    grad.addColorStop(0.4, '#3a6a7a');
    grad.addColorStop(0.7, '#6a9a8a');
    grad.addColorStop(1, '#8aba9a');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H-GROUND_HEIGHT);

    ctx.save();
    const moonX = W*0.82, moonY = H*0.15, moonR = scaleVal(24);
    const glow = ctx.createRadialGradient(moonX,moonY,0,moonX,moonY,moonR*3);
    glow.addColorStop(0,'rgba(255,240,200,0.25)');
    glow.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(moonX,moonY,moonR*3,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f0e8d0';
    ctx.beginPath();
    ctx.arc(moonX,moonY,moonR,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Stars (fewer for performance)
    ctx.save();
    const starCount = isMobile ? 15 : 25;
    for(let i=0;i<starCount;i++){
      const sx = (i*137 + 50) % W;
      const sy = (i*97 + 20) % (H*0.5);
      const bright = 0.3 + Math.sin(frame*0.02 + i)*0.3;
      ctx.fillStyle = `rgba(255,255,255,${bright})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 0.5+Math.random()*0.4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawHillLayer(offset, color, baseY, amp, wavelength){
    ctx.save();
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H-GROUND_HEIGHT);
    for(let x=0; x<=W; x+=15){
      const y = baseY - Math.sin((x+offset)/wavelength)*amp - Math.sin((x+offset)/(wavelength*2.3))*amp*0.5;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W, H-GROUND_HEIGHT);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawClouds(){
    ctx.save();
    for(let i=0;i<clouds.length;i++){
      const c = clouds[i];
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.scale(c.scale, c.scale);
      ctx.fillStyle = 'rgba(200,220,240,0.12)';
      ctx.beginPath();
      ctx.ellipse(2,2,24,13,0,0,Math.PI*2);
      ctx.ellipse(18,-4,15,10,0,0,Math.PI*2);
      ctx.ellipse(-16,-2,14,9,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(220,240,255,0.2)';
      ctx.beginPath();
      ctx.ellipse(0,0,22,12,0,0,Math.PI*2);
      ctx.ellipse(16,-6,14,10,0,0,Math.PI*2);
      ctx.ellipse(-16,-4,13,9,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawPipe(p){
    ctx.save();
    const capH = 22;
    function segment(x,y,w,h){
      const g = ctx.createLinearGradient(x,0,x+w,0);
      g.addColorStop(0, '#2a5a2a');
      g.addColorStop(0.18, '#4a8a4a');
      g.addColorStop(0.5, '#5aaa5a');
      g.addColorStop(0.82, '#4a8a4a');
      g.addColorStop(1, '#2a5a2a');
      ctx.fillStyle = g;
      ctx.fillRect(x,y,w,h);
      ctx.strokeStyle = 'rgba(20,50,20,0.3)';
      ctx.lineWidth = 1.2;
      ctx.strokeRect(x+1,y,w-2,h);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(x+w*0.15, y, w*0.12, h);
    }
    segment(p.x, 0, PIPE_WIDTH, p.topH-capH);
    segment(p.x-4, p.topH-capH, PIPE_WIDTH+8, capH);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.fillRect(p.x-4, p.topH-3, PIPE_WIDTH+8, 3);

    const botY = p.topH+p.gap;
    segment(p.x, botY+capH, PIPE_WIDTH, H-GROUND_HEIGHT-(botY+capH));
    segment(p.x-4, botY, PIPE_WIDTH+8, capH);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.fillRect(p.x-4, botY+capH, PIPE_WIDTH+8, 3);
    ctx.restore();

    // Draw key
    if(p.hasKey && !p.keyCollected){
      const keyX = p.x + PIPE_WIDTH/2;
      const keyY = p.topH + p.gap/2 + Math.sin(frame*0.07 + p.topH)*4;
      ctx.save();
      const glow = ctx.createRadialGradient(keyX,keyY,0,keyX,keyY,KEY_PICKUP_R*2);
      glow.addColorStop(0,'rgba(255,215,0,0.35)');
      glow.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(keyX,keyY,KEY_PICKUP_R*2,0,Math.PI*2);
      ctx.fill();
      ctx.font = (KEY_PICKUP_R*1.6)+'px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('🔑', keyX, keyY);
      ctx.restore();
    }

    // Draw diamond
    if(p.hasDiamond && !p.diamondCollected){
      const diaX = p.x + PIPE_WIDTH/2;
      const diaY = p.topH + p.gap/2 + 35 + Math.sin(frame*0.05 + p.topH + 1)*5;
      ctx.save();
      const glow = ctx.createRadialGradient(diaX,diaY,0,diaX,diaY,DIAMOND_PICKUP_R*2);
      glow.addColorStop(0,'rgba(0,212,255,0.35)');
      glow.addColorStop(1,'rgba(0,212,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(diaX,diaY,DIAMOND_PICKUP_R*2,0,Math.PI*2);
      ctx.fill();
      ctx.font = (DIAMOND_PICKUP_R*1.6)+'px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('💎', diaX, diaY);
      ctx.restore();
    }
  }

  function drawGround(){
    ctx.save();
    const gy = H - GROUND_HEIGHT;
    const grad = ctx.createLinearGradient(0,gy,0,H);
    grad.addColorStop(0,'#8a7a4a');
    grad.addColorStop(0.15,'#6a5a3a');
    grad.addColorStop(1,'#3a2a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, GROUND_HEIGHT);

    ctx.fillStyle = '#6a9a4a';
    ctx.fillRect(0, gy, W, 8);
    ctx.fillStyle = '#5a8a3a';
    const stripeW = 18;
    const offset = (frame*PIPE_SPEED) % stripeW;
    for(let x=-stripeW; x<W+stripeW; x+=stripeW){
      ctx.beginPath();
      ctx.moveTo(x-offset, gy+8);
      ctx.lineTo(x-offset+8, gy);
      ctx.lineTo(x-offset+14, gy);
      ctx.lineTo(x-offset+5, gy+8);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSpeedLines(){
    if(state!=='playing') return;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    for(let i=0;i<2;i++){
      const off = (frame*3 + i*25) % 50;
      const ly = bird.y + (i-0.5)*bird.r*0.6;
      const lx = bird.x - bird.r*1.2 - off;
      ctx.globalAlpha = 0.25 - off/150;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx-12, ly);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBird(){
    ctx.save();
    if(bird.invuln > 0 && Math.floor(bird.invuln/4)%2===0){ ctx.globalAlpha = 0.4; }
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);
    const r = bird.r;
    const wing = Math.sin(bird.wingPhase) * (0.5 + bird.flapBoost*0.8);
    const outline = '#2a1a0a';
    const color = bird.color || '#ffd23f';

    ctx.fillStyle = color;
    ctx.strokeStyle = outline;
    ctx.lineWidth = Math.max(1.4, r*0.13);
    ctx.beginPath();
    ctx.ellipse(0,0, r*1.12, r*1.0, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // Wing
    ctx.save();
    ctx.translate(-r*0.12, r*0.12);
    ctx.rotate(wing*0.5);
    const wingColor = darkenColor(color, 25);
    ctx.fillStyle = wingColor;
    ctx.beginPath();
    ctx.moveTo(-r*0.8, r*0.05);
    ctx.quadraticCurveTo(-r*0.12, -r*0.5 + wing*r*0.3, r*0.3, r*0.05);
    ctx.quadraticCurveTo(-r*0.12, r*0.5 + wing*r*0.15, -r*0.8, r*0.05);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Eye
    const eyeX = r*0.4, eyeY = -r*0.3, eyeR = r*0.45;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, eyeR, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    const pupilOffset = Math.max(-0.3, Math.min(0.3, bird.vy/18));
    ctx.fillStyle = '#1a0a0a';
    ctx.beginPath();
    ctx.arc(eyeX + eyeR*0.28, eyeY + eyeR*0.15 + pupilOffset*eyeR*0.4, eyeR*0.4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(eyeX + eyeR*0.4, eyeY - eyeR*0.05, eyeR*0.12, 0, Math.PI*2);
    ctx.fill();

    // Beak
    const bx = r*0.7, by = r*0.05;
    ctx.fillStyle = '#ff7a3d';
    ctx.beginPath();
    ctx.moveTo(bx, by-r*0.25);
    ctx.quadraticCurveTo(r*1.45, by-r*0.28, r*1.5, by);
    ctx.quadraticCurveTo(r*1.45, by+r*0.28, bx, by+r*0.25);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = 'rgba(42,26,10,0.5)';
    ctx.beginPath();
    ctx.moveTo(bx+r*0.05, by);
    ctx.lineTo(r*1.4, by);
    ctx.lineWidth = Math.max(1, r*0.08);
    ctx.stroke();

    ctx.restore();
  }

  function darkenColor(hex, amount){
    let c = hex.replace('#','');
    if(c.length===3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    let r = parseInt(c.substring(0,2),16);
    let g = parseInt(c.substring(2,4),16);
    let b = parseInt(c.substring(4,6),16);
    r = Math.max(0, r - amount);
    g = Math.max(0, g - amount);
    b = Math.max(0, b - amount);
    return `rgb(${r},${g},${b})`;
  }

  function drawParticles(){
    ctx.save();
    for(let i=0;i<particles.length;i++){
      const pt = particles[i];
      ctx.globalAlpha = Math.max(0, pt.life/pt.maxLife);
      ctx.fillStyle = pt.color || '#fff8e0';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size * 0.7, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawClouds();
    drawHillLayer(hills.farOffset, 'rgba(60,120,80,0.4)', H-GROUND_HEIGHT-18, 12, 80);
    drawHillLayer(hills.nearOffset, 'rgba(40,100,60,0.5)', H-GROUND_HEIGHT-6, 8, 50);
    
    for(let i=0;i<pipes.length;i++){
      drawPipe(pipes[i]);
    }
    
    drawSpeedLines();
    drawParticles();
    drawBird();
    drawGround();
  }

  // ============================================================
  // SHOP
  // ============================================================
  function renderShop(){
    const grid = document.getElementById('shopGrid');
    grid.innerHTML = '';
    SKINS.forEach(skin => {
      const div = document.createElement('div');
      div.className = 'shop-item';
      const owned = ownedSkins.includes(skin.id);
      const selected = selectedSkin === skin.id;
      if(owned) div.classList.add('owned');
      if(selected) div.classList.add('selected');
      
      const preview = document.createElement('div');
      preview.className = 'bird-preview';
      const color = skin.color;
      const dark = darkenColor(color, 30);
      preview.innerHTML = `
        <svg viewBox="0 0 64 52">
          <ellipse cx="30" cy="27" rx="18" ry="15" fill="${color}" stroke="#2a1a0a" stroke-width="2"/>
          <path d="M10 30 Q17 21 24 27 Q17 33 8 32Z" fill="${dark}" stroke="#2a1a0a" stroke-width="1.5"/>
          <circle cx="37" cy="20" r="8" fill="#fff" stroke="#2a1a0a" stroke-width="2"/>
          <circle cx="39.5" cy="20" r="3.5" fill="#1a0a0a"/>
          <circle cx="41" cy="18" r="1" fill="#fff"/>
          <path d="M44 24 Q56 22 56 29 Q56 34 44 32 Z" fill="#ff7a3d" stroke="#2a1a0a" stroke-width="2"/>
          <line x1="45" y1="28" x2="55" y2="28" stroke="#2a1a0a" stroke-width="1.2"/>
        </svg>
      `;
      
      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = skin.name;
      
      const price = document.createElement('div');
      price.className = 'price';
      if(owned){
        price.innerHTML = '<span class="owned-badge">✓ OWNED</span>';
      } else if(skin.cost === 0){
        price.textContent = 'FREE';
      } else if(skin.currency === 'key'){
        price.innerHTML = `<span class="key-icon">🔑</span> ${skin.cost}`;
      } else if(skin.currency === 'diamond'){
        price.innerHTML = `<span class="diamond-icon">💎</span> ${skin.cost}`;
      }
      
      div.appendChild(preview);
      div.appendChild(name);
      div.appendChild(price);
      
      div.addEventListener('click', () => {
        if(owned){
          selectedSkin = skin.id;
          document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          updateUI();
          renderShop();
          return;
        }
        if(skin.currency === 'key' && keys >= skin.cost){
          keys -= skin.cost;
          ownedSkins.push(skin.id);
          selectedSkin = skin.id;
          updateUI();
          renderShop();
        } else if(skin.currency === 'diamond' && diamonds >= skin.cost){
          diamonds -= skin.cost;
          ownedSkins.push(skin.id);
          selectedSkin = skin.id;
          updateUI();
          renderShop();
        } else {
          div.style.borderColor = '#ff4444';
          div.style.background = 'rgba(255,0,0,0.1)';
          setTimeout(() => {
            div.style.borderColor = '';
            div.style.background = '';
          }, 300);
        }
      });
      
      grid.appendChild(div);
    });
  }

  // ============================================================
  // LOOP
  // ============================================================
  function loop(now){
    update(now);
    render();
    animFrameId = requestAnimationFrame(loop);
  }

  // ============================================================
  // EVENT LISTENERS
  // ============================================================
  function handleInput(e){
    if(e){ e.preventDefault(); }
    if(state === 'dead' || state === 'falling') return;
    if(!gameActive) return;
    flap();
  }

  // Touch and mouse events
  canvas.addEventListener('pointerdown', handleInput);
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleInput(e);
  }, {passive: false});
  
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code==='ArrowUp' || e.key===' '){
      e.preventDefault();
      handleInput(e);
    }
  });

  // Menu buttons
  document.getElementById('playBtn').addEventListener('click', () => {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    initGame();
    state = 'ready';
    gameActive = true;
  });

  document.getElementById('shopBtn').addEventListener('click', () => {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('shopScreen').classList.remove('hidden');
    renderShop();
    updateUI();
  });

  document.getElementById('shopBackBtn').addEventListener('click', () => {
    document.getElementById('shopScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    updateUI();
  });

  document.getElementById('respownBtn').addEventListener('click', respawn);
  document.getElementById('goMenuBtn').addEventListener('click', goToMenu);

  // ============================================================
  // INIT
  // ============================================================
  resize();
  initScenery();
  initGame();
  updateUI();
  document.getElementById('mainMenu').classList.remove('hidden');
  
  // Start the loop
  if(animFrameId) cancelAnimationFrame(animFrameId);
  requestAnimationFrame(loop);

  console.log('🛒 Dusk Glider — Optimized for PC & Mobile');
  console.log('Collect keys 🔑 and diamonds 💎 to unlock new bird skins!');
  console.log('Max keys: 1000, Max diamonds: 1000');
  console.log('When you crash, choose to respawn with a key or return to menu.');
})();
</script>
